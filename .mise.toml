# mise tool version management for cc-relay

[tools]
go = "1.26.2"

# Task runner
"go:github.com/go-task/task/v3/cmd/task" = "latest"

# Live reload
"go:github.com/air-verse/air" = "latest"

# Linter (handles formatting too)
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "v2.11.4"

# Git hooks
"go:github.com/evilmartians/lefthook" = "latest"
